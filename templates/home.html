<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudBox | Kelajak Buluti</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #3a7bd5;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            /* Harakatlanuvchi gradient fon */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #00d2ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Navbar Dizayni */
        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(to right, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.9rem;
            transition: 0.3s;
            opacity: 0.8;
        }

        .nav-links a:hover {
            opacity: 1;
            color: var(--primary);
        }

        /* Asosiy Hero qism */
        .hero-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 60px 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 700px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.7;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Tugmalar */
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 15px;
            font-weight: 600;
            transition: 0.4s;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white;
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.3);
        }

        .btn-outline {
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 210, 255, 0.5);
        }

        .btn-outline:hover {
            background: white;
            color: #0f0c29;
        }

        /* Kichik detallar */
        .badge {
            background: rgba(0, 210, 255, 0.1);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: inline-block;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="logo">CloudBox</a>
        <div class="nav-links">
            <a href="#"><i class="fas fa-info-circle"></i> Haqida</a>
            <a href="#"><i class="fas fa-shield-alt"></i> Xavfsizlik</a>
            <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 600;">Kirish</a>
        </div>
    </nav>

    <div class="hero-container">
        <div class="glass-card">
            <div class="badge">V2.0 Yangilanishi tayyor</div>
            <h1>Fayllaringiz Kelajak <span style="color: var(--primary)">Bulutida</span></h1>
            <p>Eng sodda, xavfsiz va zamonaviy bulutli saqlash platformasi. Ma'lumotlaringizni shifrlangan holda saqlang va istalgan joydan kirish imkoniga ega bo'ling.</p>
            
            <div class="btn-group">
                <a href="{{ url_for('login') }}" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Ishni boshlash
                </a>
                <a href="{{ url_for('register') }}" class="btn btn-outline">
                    <i class="fas fa-user-plus"></i> Ro'yxatdan o'tish
                </a>
            </div>
        </div>
    </div>

</body>
</html>
