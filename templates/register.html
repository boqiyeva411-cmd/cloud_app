<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudBox | Ro'yxatdan o'tish</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #3a7bd5;
            --bg: #0f0c29;
            --danger: #ff4b2b;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: radial-gradient(circle at bottom left, #302b63, #0f0c29);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent);
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.15;
            animation: float 12s infinite alternate;
        }

        @keyframes float {
            from { transform: translate(20%, 20%); }
            to { transform: translate(-20%, -20%); }
        }

        .form-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h2 {
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-bottom: 30px;
        }

        /* Flash xabarlar uchun stil */
        .flash-msg {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 12px;
            background: rgba(255, 75, 43, 0.15);
            border: 1px solid var(--danger);
            color: white;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            outline: none;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, var(--accent), var(--primary));
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(58, 123, 213, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(58, 123, 213, 0.4);
            filter: brightness(1.1);
        }

        .footer-links {
            margin-top: 25px;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 10px;
            opacity: 0.8;
            transition: 0.3s;
        }

        .footer-links a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .back-btn {
            color: white !important;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="form-card">
        <h2>Ro'yxatdan o'tish</h2>
        <p>CloudBox olamiga qo'shiling</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-msg">
                  <i class="fas fa-exclamation-circle"></i> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('register') }}" method="POST">
            <div class="input-group">
                <i class="fas fa-user-plus"></i>
                <input name="username" placeholder="Yangi foydalanuvchi nomi" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input name="password" type="password" placeholder="Yangi parol" required>
            </div>
            
            <button type="submit">
                Ro'yxatdan o'tish <i class="fas fa-user-check"></i>
            </button>
        </form>
        
        <div class="footer-links">
            <a href="{{ url_for('login') }}">Akkauntingiz bormi? Kirish</a>
            <a href="{{ url_for('home') }}" class="back-btn"><i class="fas fa-arrow-left"></i> Orqaga qaytish</a>
        </div>
    </div>

</body>
</html>
